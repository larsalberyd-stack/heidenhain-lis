name: Build and deploy Node.js app to Azure Web App - heidenhain-lis-eu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/dist/public
          cp dist/index.js deploy/dist/
          cp -r dist/public/* deploy/dist/public/
          cp package.json deploy/

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_69D16FC8636C4C40A114FB00074418A1 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B03FBB4F8DE543849C6B329020974BA1 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB5C1DD5427E45E293B21F48BB48626E }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'heidenhain-lis-eu'
          slot-name: 'Production'
          package: deploy
